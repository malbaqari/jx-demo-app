config log traffic-log
  set status enable
end

config server-policy vserver
  edit "vs-jx-demo-app"
    config vip-list
      edit 1
        set interface port1
      next
    end
  next
end

config server-policy server-pool
  edit "sp-jx-demo-app"
    config pserver-list
      edit 1
        set ip {{cluster-ip}}
        set port {{cluster-port}}
      next
    end
  next
end

config server-policy policy
  edit "policy-jx-demo-app"
    set vserver vs-jx-demo-app
    set service HTTP
    set web-protection-profile "Inline Standard Protection"
    set replacemsg Predefined
    set server-pool sp-jx-demo-app
    set tlog enable
    config http-content-routing-list
    end
  next
end
