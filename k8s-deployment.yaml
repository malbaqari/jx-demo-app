apiVersion: apps/v1
kind: Deployment
metadata:
  name: jx-demo-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: jx-demo-app}
  template:
    metadata:
      labels: {app: jx-demo-app}
    spec:
      containers:
        - name: jx-demo-app
          image: PLACEHOLDER_IMAGE
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: jx-demo-app
  namespace: demo
spec:
  selector: {app: jx-demo-app}
  ports:
    - port: 80
      targetPort: 8080
