apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: demo
spec:
  params:
    - name: url
    - name: revision
      default: main
  workspaces:
    - name: output
  steps:
    - name: clone
      image: alpine/git
      script: |
        git clone $(params.url) $(workspaces.output.path)
        cd $(workspaces.output.path) && git checkout $(params.revision)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build-push
  namespace: demo
spec:
  params:
    - name: image
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:latest
      args:
        - --dockerfile=$(workspaces.source.path)/Dockerfile
        - --context=$(workspaces.source.path)
        - --destination=$(params.image)
        - --skip-tls-verify
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-creds
        items:
          - key: .dockerconfigjson
            path: config.json
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy
  namespace: demo
spec:
  params:
    - name: image
  workspaces:
    - name: source
  steps:
    - name: apply
      image: bitnami/kubectl:latest
      script: |
        cd $(workspaces.source.path)
        sed -i "s#PLACEHOLDER_IMAGE#$(params.image)#g" k8s-deployment.yaml
        kubectl apply -f k8s-deployment.yaml
        kubectl rollout status deployment/jx-demo-app -n demo --timeout=120s
