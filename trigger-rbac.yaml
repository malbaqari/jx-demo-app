apiVersion: v1
kind: ServiceAccount
metadata: {name: tekton-triggers-sa, namespace: demo}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: {name: tekton-triggers-sa-binding, namespace: demo}
subjects:
  - {kind: ServiceAccount, name: tekton-triggers-sa, namespace: demo}
roleRef: {kind: ClusterRole, name: tekton-triggers-eventlistener-roles, apiGroup: rbac.authorization.k8s.io}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: {name: tekton-triggers-sa-clusterbinding}
subjects:
  - {kind: ServiceAccount, name: tekton-triggers-sa, namespace: demo}
roleRef: {kind: ClusterRole, name: tekton-triggers-eventlistener-clusterroles, apiGroup: rbac.authorization.k8s.io}
